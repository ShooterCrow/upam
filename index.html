<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/UPAM.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPAM</title>
    <style>
      /* Hide the Google Translate top banner if it appears */
      .skiptranslate iframe,
      .goog-te-banner-frame.skiptranslate,
      #goog-gt-tt {
        display: none !important;
      }
      body {
        top: 0px !important;
      }
      /* Optional: Hide the "Powered by Google" text but keep the dropdown */
      .goog-logo-link {
        display: none !important;
      }
      .goog-te-gadget {
        color: transparent !important;
        font-size: 0 !important;
        display: flex !important;
        align-items: center !important;
        flex-direction: row !important;
        white-space: nowrap !important;
      }
      .goog-te-gadget::before {
        content: "";
        display: inline-block;
        width: 18px;
        height: 18px;
        background-image: url("https://www.gstatic.com/images/branding/product/1x/translate_24dp.png");
        background-size: contain;
        background-repeat: no-repeat;
        margin-right: 4px;
        flex-shrink: 0;
      }
      .goog-te-gadget .goog-te-combo {
        margin: 4px 0 !important;
        padding: 4px 8px !important;
        border-radius: 4px !important;
        border: 1px solid #e5e7eb !important; /* gray-200 */
        background-color: white !important;
        color: #374151 !important; /* gray-700 */
        font-size: 13px !important;
        cursor: pointer !important;
        width: 140px !important;
        min-width: 130px !important;
        outline: none !important;
      }
      .goog-te-gadget span,
      .goog-te-gadget a {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            layout: google.translate.TranslateElement.InlineLayout.VERTICAL,
            autoDisplay: false,
          },
          "google_translate_element",
        );
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
